name: Compile LaTeX to PDF

on:
  repository_dispatch:
    types: [compile-pdf]

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install TeX Live with Chinese support
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full fonts-noto-cjk fonts-noto-cjk-extra python3

      - name: Download original source from arXiv
        env:
          ARXIV_ID: ${{ github.event.client_payload.arxiv_id }}
        run: |
          echo "Downloading arXiv source for: $ARXIV_ID"
          curl -L -f -o source.gz "https://export.arxiv.org/e-print/${ARXIV_ID}"
          echo "Downloaded $(wc -c < source.gz) bytes"

      - name: Extract source
        run: |
          mkdir -p source
          cd source
          # Try gunzip first
          if gunzip -c ../source.gz > source.tar 2>/dev/null; then
            if tar tf source.tar > /dev/null 2>&1; then
              tar xf source.tar
              rm source.tar
              echo "Extracted tar archive"
            else
              # It's a plain tex file (gzipped)
              mv source.tar main.tex
              echo "Single tex file"
            fi
          else
            # Not gzipped, might be raw tex
            cp ../source.gz main.tex
            echo "Raw tex file"
          fi
          echo "=== Files ==="
          find . -type f | head -50

      - name: Download translated body from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PAPER_SLUG: ${{ github.event.client_payload.slug }}
        run: |
          curl -f -o /tmp/translated_body.tex \
            "${SUPABASE_URL}/storage/v1/object/public/papers/${PAPER_SLUG}.tex"
          echo "Translated body: $(wc -l < /tmp/translated_body.tex) lines, $(wc -c < /tmp/translated_body.tex) bytes"

      - name: Merge translated body into original source
        run: |
          cd source

          # Find main tex file
          export MAIN_FILE=$(grep -rl '\\begin{document}' *.tex 2>/dev/null | head -1)
          if [ -z "$MAIN_FILE" ]; then
            export MAIN_FILE=$(find . -name '*.tex' -exec grep -l '\\begin{document}' {} \; | head -1)
          fi
          echo "Main file: $MAIN_FILE"
          echo "=== Original body preview ==="
          grep -A 3 '\\begin{document}' "$MAIN_FILE" || true
          echo "=== Translated body preview ==="
          head -5 /tmp/translated_body.tex

          python3 -c "
import os

main_file = os.environ['MAIN_FILE']
print(f'Merging into: {main_file}')

with open(main_file, 'r', encoding='utf-8', errors='replace') as f:
    original = f.read()

with open('/tmp/translated_body.tex', 'r', encoding='utf-8', errors='replace') as f:
    translated = f.read()

begin_idx = original.find(r'\begin{document}')
end_idx = original.rfind(r'\end{document}')

if begin_idx == -1:
    print('ERROR: No begin document found')
    exit(1)

preamble = original[:begin_idx]

# Inject xeCJK if not present
if 'xeCJK' not in preamble and 'ctex' not in preamble:
    cjk = r'''
\usepackage{xeCJK}
\setCJKmainfont{Noto Serif CJK SC}
\setCJKsansfont{Noto Sans CJK SC}
\setCJKmonofont{Noto Sans Mono CJK SC}
'''
    preamble = preamble.rstrip() + '\n' + cjk + '\n'

new_content = preamble + r'\begin{document}' + '\n' + translated + '\n' + r'\end{document}' + '\n'

with open(main_file, 'w', encoding='utf-8') as f:
    f.write(new_content)

print(f'Done: {len(preamble)} chars preamble + {len(translated)} chars translated body')
          "

      - name: Compile with XeLaTeX
        run: |
          cd source
          MAIN=$(grep -rl '\\begin{document}' *.tex 2>/dev/null | head -1 || echo "main.tex")
          echo "Compiling: $MAIN"

          # First pass
          xelatex -interaction=nonstopmode "$MAIN" 2>&1 | tail -20 || true

          # Second pass (for references)
          xelatex -interaction=nonstopmode "$MAIN" 2>&1 | tail -5 || true

          # Check if PDF was generated
          PDF="${MAIN%.tex}.pdf"
          if [ -f "$PDF" ]; then
            echo "SUCCESS: PDF generated ($(wc -c < "$PDF") bytes, $(pdfinfo "$PDF" 2>/dev/null | grep Pages || echo 'unknown pages'))"
          else
            echo "FAILED: No PDF generated"
            # Show last errors
            cat "${MAIN%.tex}.log" | grep "^!" | head -20
            exit 1
          fi

      - name: Upload PDF to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PAPER_SLUG: ${{ github.event.client_payload.slug }}
        run: |
          cd source
          MAIN=$(grep -rl '\\begin{document}' *.tex 2>/dev/null | head -1 || echo "main.tex")
          PDF="${MAIN%.tex}.pdf"

          # Delete existing PDF (ignore errors)
          curl -s -X DELETE \
            "${SUPABASE_URL}/storage/v1/object/papers/${PAPER_SLUG}.pdf" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" || true

          # Upload PDF
          curl -f -X POST \
            "${SUPABASE_URL}/storage/v1/object/papers/${PAPER_SLUG}.pdf" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/pdf" \
            --data-binary @"$PDF"

          echo "PDF uploaded: ${SUPABASE_URL}/storage/v1/object/public/papers/${PAPER_SLUG}.pdf"

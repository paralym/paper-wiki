name: Compile LaTeX to PDF

on:
  repository_dispatch:
    types: [compile-pdf]

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install TeX Live with Chinese support
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full fonts-noto-cjk fonts-noto-cjk-extra python3

      - name: Download original source from arXiv
        env:
          ARXIV_ID: ${{ github.event.client_payload.arxiv_id }}
        run: |
          echo "Downloading arXiv source for: $ARXIV_ID"
          curl -L -f -o source.gz "https://export.arxiv.org/e-print/${ARXIV_ID}"
          echo "Downloaded $(wc -c < source.gz) bytes"

      - name: Extract source
        run: |
          mkdir -p source
          cd source
          if gunzip -c ../source.gz > source.tar 2>/dev/null; then
            if tar tf source.tar > /dev/null 2>&1; then
              tar xf source.tar
              rm source.tar
              echo "Extracted tar archive"
            else
              mv source.tar main.tex
              echo "Single tex file"
            fi
          else
            cp ../source.gz main.tex
            echo "Raw tex file"
          fi
          echo "=== Files ==="
          find . -type f | head -50

      - name: Download translated body from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PAPER_SLUG: ${{ github.event.client_payload.slug }}
        run: |
          curl -f -o /tmp/translated_body.tex "${SUPABASE_URL}/storage/v1/object/public/papers/${PAPER_SLUG}.tex"
          echo "Translated body: $(wc -l < /tmp/translated_body.tex) lines"
          echo "=== Preview ==="
          head -10 /tmp/translated_body.tex

      - name: Write merge script
        run: |
          cat > /tmp/merge.py << 'SCRIPT'
          import os, sys, glob

          # Find main tex file
          tex_files = glob.glob('source/**/*.tex', recursive=True) + glob.glob('source/*.tex')
          main_file = None
          for f in tex_files:
              with open(f, 'r', encoding='utf-8', errors='replace') as fh:
                  if '\\begin{document}' in fh.read():
                      main_file = f
                      break

          if not main_file:
              print("ERROR: No file with \\begin{document} found")
              sys.exit(1)

          print(f"Main file: {main_file}")

          with open(main_file, 'r', encoding='utf-8', errors='replace') as f:
              original = f.read()

          with open('/tmp/translated_body.tex', 'r', encoding='utf-8', errors='replace') as f:
              translated = f.read()

          begin_idx = original.find('\\begin{document}')
          if begin_idx == -1:
              print("ERROR: No \\begin{document} found in file content")
              sys.exit(1)

          preamble = original[:begin_idx]

          if 'xeCJK' not in preamble and 'ctex' not in preamble:
              preamble += '\n\\usepackage{xeCJK}\n'
              preamble += '\\setCJKmainfont{Noto Serif CJK SC}\n'
              preamble += '\\setCJKsansfont{Noto Sans CJK SC}\n'
              preamble += '\\setCJKmonofont{Noto Sans Mono CJK SC}\n'

          new_content = preamble + '\\begin{document}\n' + translated + '\n\\end{document}\n'

          with open(main_file, 'w', encoding='utf-8') as f:
              f.write(new_content)

          print(f"Merged: {len(preamble)} preamble + {len(translated)} body chars")
          print(f"Total: {len(new_content)} chars written to {main_file}")
          SCRIPT

      - name: Merge translated body into original source
        run: python3 /tmp/merge.py

      - name: Compile with XeLaTeX
        run: |
          cd source
          MAIN=$(grep -rl '\\begin{document}' *.tex 2>/dev/null | head -1 || echo "main.tex")
          echo "Compiling: $MAIN"
          xelatex -interaction=nonstopmode "$MAIN" 2>&1 | tail -20 || true
          xelatex -interaction=nonstopmode "$MAIN" 2>&1 | tail -5 || true
          PDF="${MAIN%.tex}.pdf"
          if [ -f "$PDF" ]; then
            echo "SUCCESS: $(wc -c < "$PDF") bytes"
          else
            echo "FAILED: No PDF"
            cat "${MAIN%.tex}.log" | grep "^!" | head -20
            exit 1
          fi

      - name: Upload PDF to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PAPER_SLUG: ${{ github.event.client_payload.slug }}
        run: |
          cd source
          MAIN=$(grep -rl '\\begin{document}' *.tex 2>/dev/null | head -1 || echo "main.tex")
          PDF="${MAIN%.tex}.pdf"
          curl -s -X DELETE "${SUPABASE_URL}/storage/v1/object/papers/${PAPER_SLUG}.pdf" -H "Authorization: Bearer ${SUPABASE_KEY}" || true
          curl -f -X POST "${SUPABASE_URL}/storage/v1/object/papers/${PAPER_SLUG}.pdf" -H "Authorization: Bearer ${SUPABASE_KEY}" -H "Content-Type: application/pdf" --data-binary @"$PDF"
          echo "Uploaded: ${SUPABASE_URL}/storage/v1/object/public/papers/${PAPER_SLUG}.pdf"
